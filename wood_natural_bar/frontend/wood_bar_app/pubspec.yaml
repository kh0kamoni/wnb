name: wood_bar_app
description: Wood Natural Bar - Restaurant POS & Management System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^3.0.3
  riverpod_annotation: ^3.0.3

  # Navigation
  go_router: ^17.1.0

  # HTTP & WebSocket
  dio: ^5.4.3
  web_socket_channel: ^3.0.1
  connectivity_plus: ^7.0.0

  # Local Storage
  hive_flutter: ^1.1.0
  hive: ^2.2.3
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^10.0.0

  # UI Components
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.3.1
  image_picker: ^1.1.2
  photo_view: ^0.15.0
  shimmer: ^3.0.0
  fl_chart: ^1.2.0
  syncfusion_flutter_charts: ^33.1.44
  intl: ^0.20.2
  timeago: ^3.7.0
  badges: ^3.1.2
  animations: ^2.0.11
  lottie: ^3.1.2
  flutter_animate: ^4.5.0
  glassmorphism: ^3.0.0

  # Icons & Fonts
  flutter_launcher_icons: ^0.14.4
  google_fonts: ^8.0.2
  material_design_icons_flutter: ^7.0.7296

  # Utils
  uuid: ^4.4.0
  logger: ^2.3.0
  path_provider: ^2.1.3
  permission_handler: ^12.0.1
  url_launcher: ^6.3.0
  share_plus: ^12.0.1
  pdf: ^3.11.1
  printing: ^5.13.1
  qr_flutter: ^4.1.0
  barcode_scan2: ^4.3.3
  audioplayers: ^6.1.0
  vibration: ^3.1.8
  wakelock_plus: ^1.2.8
  device_info_plus: ^12.3.0
  network_info_plus: ^7.0.0

  # Date & Time
  table_calendar: ^3.1.2

  # Forms
  reactive_forms: ^18.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.11
  riverpod_generator: ^3.0.0-dev.11
  hive_generator: ^2.0.1
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/fonts/
    - assets/sounds/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
